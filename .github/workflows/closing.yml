name: closing-clv
on:
  schedule:
    - cron: "0 4 * * *"    # ~04:00 UTC: closing lines -> CLV
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Closing lines -> CLV
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          SPORTSGAMEODDS_API_KEY: ${{ secrets.SPORTSGAMEODDS_API_KEY }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
        run: python run_closing.py
      - name: Commit CLV updates
        run: |
          git config user.name "edge-hub-bot"
          git config user.email "edge-hub-bot@users.noreply.github.com"
          git add reports/*.md data/clv ERRORS.md || true
          git diff --cached --quiet || git commit -m "closing CLV $(date -u +%F)"
          git push
